<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>FastBook Viewer - 읽기</title>
    <link rel="stylesheet" href="css/viewer.css">
    <meta name="theme-color" content="#000000">
</head>
<body>
<!-- 네트워크 상태 배너 -->
<div id="networkBanner" class="network-banner" role="alert" aria-live="polite"></div>

    <div id="viewer" class="viewer">
        <!-- 상단 툴바 -->
        <div id="toolbar" class="toolbar" role="toolbar" aria-label="뷰어 컨트롤">
            <button id="backBtn" class="btn-icon" title="목록으로" aria-label="책 목록으로 돌아가기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <div class="book-title" id="bookTitle" role="heading" aria-level="1"></div>
            <div class="toolbar-right">
                <!-- 보기 모드 버튼들 -->
                <button id="scrollModeBtn" class="view-mode-btn" title="연속 스크롤" aria-label="연속 스크롤 모드" aria-pressed="false">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                    스크롤
                </button>
                <button id="spreadModeBtn" class="view-mode-btn" title="2페이지 보기" aria-label="2페이지 펼침 보기" aria-pressed="false">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <rect x="2" y="3" width="9" height="18" rx="1"/><rect x="13" y="3" width="9" height="18" rx="1"/>
                    </svg>
                    2페이지
                </button>
                <!-- 북마크 버튼 -->
                <button id="bookmarkBtn" class="btn-icon" title="북마크" aria-label="현재 페이지 북마크" aria-pressed="false">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
                    </svg>
                </button>
                <!-- 북마크 목록 버튼 -->
                <button id="bookmarkListBtn" class="btn-icon" title="북마크 목록" aria-label="북마크 목록 열기">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
                        <line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                </button>
                <button id="fullscreenBtn" class="btn-icon" title="전체화면" aria-label="전체화면 전환">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 북마크 사이드 패널 -->
        <div id="bookmarkPanel" class="bookmark-panel" role="complementary" aria-label="북마크 목록">
            <div class="bookmark-panel-header">
                <h3>북마크</h3>
                <button id="bookmarkPanelClose" class="bookmark-panel-close" aria-label="북마크 패널 닫기">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div id="bookmarkList" class="bookmark-list" role="list" aria-label="북마크된 페이지 목록"></div>
        </div>

        <!-- 이미지 표시 영역 -->
        <div id="imageContainer" class="image-container">
            <!-- 로딩 스켈레톤 -->
            <div id="loadingSkeleton" class="loading-skeleton">
                <div class="skeleton-box"></div>
            </div>

            <!-- 메인 이미지 -->
            <img id="mainImage" class="main-image" alt="페이지 이미지" style="display:none;">

            <!-- 에러 상태 -->
            <div id="imageError" class="image-error" style="display:none;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
                <p>이미지를 불러올 수 없습니다</p>
                <button id="reloadImageBtn" class="btn-secondary">다시 시도</button>
            </div>

            <!-- 네비게이션 영역 (투명 클릭 영역) -->
            <div class="nav-area nav-prev" id="navPrev"></div>
            <div class="nav-area nav-next" id="navNext"></div>
        </div>

        <!-- 하단 컨트롤 -->
        <div id="controls" class="controls" role="navigation" aria-label="페이지 탐색 컨트롤">
            <div class="controls-content">
                <!-- 페이지 정보 -->
                <div class="page-info" role="group" aria-label="페이지 이동">
                    <button id="prevPageBtn" class="btn-icon" title="이전 페이지" aria-label="이전 페이지">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                    <div class="page-display">
                        <input type="number" id="currentPageInput" class="page-input" min="1" aria-label="현재 페이지">
                        <span class="page-separator" aria-hidden="true">/</span>
                        <span id="totalPages" class="total-pages" aria-label="전체 페이지 수">0</span>
                    </div>
                    <button id="nextPageBtn" class="btn-icon" title="다음 페이지" aria-label="다음 페이지">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </button>
                </div>

                <!-- 진행률 슬라이더 -->
                <div class="progress-container">
                    <input type="range" id="progressSlider" class="progress-slider" min="1" value="1" aria-label="페이지 진행률">
                    <div class="progress-fill" id="progressFill" aria-hidden="true"></div>
                </div>

                <!-- 줌 컨트롤 -->
                <div class="zoom-controls" role="group" aria-label="확대/축소">
                    <button id="zoomOutBtn" class="btn-icon" title="축소" aria-label="축소">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35M8 11h6"/>
                        </svg>
                    </button>
                    <button id="zoomResetBtn" class="btn-icon" title="원본 크기" aria-label="원본 크기로 초기화">
                        <span id="zoomLevel" aria-live="polite">100%</span>
                    </button>
                    <button id="zoomInBtn" class="btn-icon" title="확대" aria-label="확대">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35M11 8v6M8 11h6"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 터치/마우스 제스처 오버레이 -->
        <div id="gestureOverlay" class="gesture-overlay"></div>
    </div>

    <!-- 스크립트 로드 - 통합 버전 사용 -->
    <script src="js/config.js"></script>
    <script src="js/viewer-all.js"></script>
</body>
</html>
